name: Test and Deploy

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:run

  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly.io CLI
        run: curl -L https://fly.io/install.sh | sh

      - name: Add flyctl to PATH
        run: echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --app fly-account \
            --build-arg NEXT_PUBLIC_ENV_TYPE="${{ secrets.NEXT_PUBLIC_ENV_TYPE }}" \
            --build-arg NEXT_PUBLIC_API_HOST="${{ secrets.NEXT_PUBLIC_API_HOST }}" \
            --build-arg NEXT_PUBLIC_APP_HOST="${{ secrets.NEXT_PUBLIC_APP_HOST }}" \
            --build-arg NEXT_PUBLIC_API_PORT="${{ secrets.NEXT_PUBLIC_API_PORT }}" \
            --build-arg NEXT_PUBLIC_API_SCHEMA="${{ secrets.NEXT_PUBLIC_API_SCHEMA }}" \
            --build-arg NEXT_PUBLIC_NEXTAUTH_URL="${{ secrets.NEXT_PUBLIC_NEXTAUTH_URL }}"
